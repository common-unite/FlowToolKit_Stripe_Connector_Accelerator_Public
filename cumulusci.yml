minimum_cumulusci_version: '3.79.0'
project:
    name: cUnite_Stripe_Connector_Accelerator
    package:
        name: "Flow Tool Kit: Stripe Connector Accelerator"
        namespace: FlowToolKit
        api_version: '65.0'
    dependencies:
        - github: 'https://github.com/common-unite/Flow_Tool_Kit_Public'
        - version_id: 04tRN000004ZhkXYAS
        - version_id: 04t4x0000003MzaAAE
    git:
    source_format: sfdx

tasks:

    export_form:
        class_path: cci_flowtoolkit_tasks.export_form.ExportFormMetadata

    github_copy_subtree:
        options:
            repo_url: "https://github.com/common-unite/FlowToolKit_Stripe_Connector_Accelerator_Public"
            branch: "main"
            create_release: true
            release_body: true
            include: [ "cumulusci.yml","sfdx-project.json","orgs/","README.md","docs/" ]

    robot:
        options:
            suites: robot/cUnite_Stripe_Connector_Accelerator/tests
            options:
                outputdir: robot/cUnite_Stripe_Connector_Accelerator/results

    robot_testdoc:
        options:
            path: robot/cUnite_Stripe_Connector_Accelerator/tests
            output: robot/cUnite_Stripe_Connector_Accelerator/doc/cUnite_Stripe_Connector_Accelerator_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 75

    scan_csv:
        description: Scan a CSV file for a specific value
        class_path: tasks.ScanCSVTask.ScanCSVTask
        options:
            csv_file_path: myFile.csv
            value_to_scan: Book

flows:

    dev_org:
        steps:
            5:
                task: deploy
                options:
                    path: force-app-form-templates
            6:
                task: deploy
                options:
                    path: site
            7:
                task: create_community
                options:
                    name: Stripe Marketing
                    template: Build Your Own
                    url_path_prefix: stripe
                    skip_existing: True
                    timeout: 120
            8:
                task: deploy
                options:
                    path: site-experiences
            9:
                task: publish_community
                options:
                    name: Stripe Marketing

    site_dev_org:
        description: Lightweight org for designing and testing site marketing components (no dependencies, no Apex)
        steps:
            1:
                task: deploy
                options:
                    path: site
            2:
                task: create_community
                options:
                    name: Stripe Marketing
                    template: Build Your Own
                    url_path_prefix: stripe
                    skip_existing: True
                    timeout: 120
            3:
                task: deploy
                options:
                    path: site-experiences-local
            4:
                task: publish_community
                options:
                    name: Stripe Marketing

    npc_dev_org:
        description: Set up an NPC scratch org with Grantmaking, OmniStudio, Action Plans, and Experience Cloud
        steps:
            1:
                flow: dependencies
            2:
                flow: deploy_unmanaged
            3:
                task: deploy
                options:
                    path: force-app-form-templates
            4:
                task: deploy
                options:
                    path: site
            5:
                task: assign_permission_sets
                options:
                    api_names: Form_Builder_Admin,Form_Flow_User
                ignore_failure: True
            6:
                task: assign_permission_set_licenses
                options:
                    api_names: OmniStudioPsl,ActionPlansPsl,GrantmakingUserPsl,FundraisingAccessPsl,ProgramAndBenefitManagementPsl,DynamicAssessmentsPsl
                ignore_failure: True
            7:
                task: assign_permission_sets
                options:
                    api_names: OmniStudioAdmin,ActionPlans,GrantmakingManager,FundraisingAccess,ProgramAndBenefitManagementAccess,DynamicAssessmentAccess,GroupMembership,DataPipelinesBaseUser,DocumentChecklist
                ignore_failure: True
            8:
                task: create_community
                options:
                    name: Stripe Marketing
                    template: Build Your Own
                    url_path_prefix: stripe
                    skip_existing: True
                    timeout: 120
            9:
                task: deploy
                options:
                    path: site-experiences
            10:
                task: publish_community
                options:
                    name: Stripe Marketing
            11:
                task: snapshot_changes

    release_2gp_beta:
        steps:
            90:
                task: github_copy_subtree
                options:
                    tag_name: "latest_beta"


    release_2gp_production:
        steps:
            90:
                task: github_copy_subtree
                options:
                    tag_name: "latest"

    testing:
        steps:
            1:
                task: scan_csv
            2:
                task: log
                options:
                    line: $org_config.found

orgs:
    scratch:
        dev:
            config_file: orgs/dev.json
            days: 30
            namespaced: True
        dev_unnamespaced:
            config_file: orgs/dev.json
            days: 30
            namespaced: False
        site:
            config_file: orgs/site.json
            days: 7
            namespaced: False
        npc:
            config_file: orgs/npc.json
            days: 7
            namespaced: True
